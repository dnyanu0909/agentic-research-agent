version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: research_agent_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    restart: unless-stopped

  backend:
    build: .
    container_name: research_agent_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ./reports:/app/reports
    restart: unless-stopped

volumes:
  ollama_storage:
