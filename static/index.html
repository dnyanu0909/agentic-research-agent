<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Agent // Mission Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1210;
    --panel:#12181a;
    --line:#243030;
    --amber:#ffb454;
    --amber-dim:#8a6a3c;
    --cyan:#6bd4c8;
    --text:#d7e0dd;
    --text-dim:#7b8b87;
    --danger:#e5675a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:920px; margin:0 auto; padding:40px 24px 80px;}
  header{border-bottom:1px solid var(--line); padding-bottom:20px; margin-bottom:28px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em;
    color:var(--amber-dim); text-transform:uppercase; margin-bottom:8px;
  }
  h1{
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:26px;
    margin:0 0 6px; color:var(--text);
  }
  h1 span{color:var(--amber);}
  .sub{color:var(--text-dim); font-size:14px; max-width:60ch;}

  .goal-row{display:flex; gap:10px; margin-bottom:28px;}
  input[type=text]{
    flex:1; background:var(--panel); border:1px solid var(--line); color:var(--text);
    font-family:'IBM Plex Mono',monospace; font-size:14px; padding:13px 14px; border-radius:3px;
    outline:none;
  }
  input[type=text]:focus{border-color:var(--amber-dim);}
  button{
    background:var(--amber); color:#1a1200; border:none; font-family:'IBM Plex Mono',monospace;
    font-weight:600; font-size:13px; letter-spacing:.04em; padding:0 22px; border-radius:3px;
    cursor:pointer; text-transform:uppercase;
  }
  button:hover{background:#ffc477;}
  button:disabled{background:var(--amber-dim); cursor:progress; color:#3a2f1c;}

  .status-line{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-dim);
    margin-bottom:18px; min-height:16px;
  }
  .status-line .dot{
    display:inline-block; width:7px; height:7px; border-radius:50%;
    background:var(--amber); margin-right:8px; animation:pulse 1.1s infinite ease-in-out;
  }
  @keyframes pulse{0%,100%{opacity:.35} 50%{opacity:1}}

  .log{
    background:var(--panel); border:1px solid var(--line); border-radius:4px;
    font-family:'IBM Plex Mono',monospace; font-size:13px; line-height:1.6;
    padding:6px 0; margin-bottom:24px; max-height:420px; overflow-y:auto;
  }
  .log:empty{display:none;}
  .step{
    padding:10px 16px; border-bottom:1px dashed var(--line); opacity:0;
    animation:in .35s ease forwards;
  }
  .step:last-child{border-bottom:none;}
  @keyframes in{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}
  .tag{
    display:inline-block; font-size:10px; font-weight:700; letter-spacing:.08em;
    padding:1px 6px; border-radius:2px; margin-right:8px; vertical-align:middle;
  }
  .tag.think{background:#2a2416; color:var(--amber);}
  .tag.act{background:#152a28; color:var(--cyan);}
  .tag.observe{background:#171f2a; color:#7fa6e0;}
  .tag.critique{background:#2a1717; color:var(--danger);}
  .step-body{color:var(--text-dim); margin-top:5px; padding-left:2px; white-space:pre-wrap;}
  .step-body b{color:var(--text); font-weight:500;}

  .report{
    background:var(--panel); border:1px solid var(--line); border-radius:4px;
    padding:22px 24px; display:none;
  }
  .report h2{
    font-family:'IBM Plex Mono',monospace; font-size:13px; letter-spacing:.1em;
    color:var(--amber-dim); text-transform:uppercase; margin:0 0 14px;
  }
  .report-body{font-size:14.5px; line-height:1.7; color:var(--text);}
  .report-body h1{
    font-family:'IBM Plex Mono',monospace; font-size:19px; color:var(--amber);
    margin:0 0 14px; padding-bottom:10px; border-bottom:1px solid var(--line);
  }
  .report-body h2{
    font-family:'IBM Plex Mono',monospace; font-size:13px; letter-spacing:.06em;
    color:var(--cyan); text-transform:uppercase; margin:22px 0 8px;
  }
  .report-body h2:first-of-type{margin-top:0;}
  .report-body p{margin:0 0 10px;}
  .report-body ul{margin:0 0 10px; padding-left:20px;}
  .report-body li{margin-bottom:5px;}
  .report-body a{color:var(--cyan); text-decoration:none; border-bottom:1px dotted var(--amber-dim);}
  .report-body a:hover{color:var(--amber);}
  .report-body strong{color:#fff; font-weight:600;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Local · No API key · Ollama-powered</div>
    <h1>Research <span>Agent</span> // Mission Log</h1>
    <div class="sub">Give it a goal. It plans, searches the web, checks its own math, drafts a report, then critiques and revises its own work before handing it back to you.</div>
  </header>

  <div class="goal-row">
    <input type="text" id="goalInput" placeholder="e.g. Research the current state of agentic AI and summarize 3 real-world use cases" />
    <button id="runBtn" onclick="runAgent()">Run</button>
  </div>

  <div class="status-line" id="statusLine"></div>
  <div class="log" id="log"></div>

  <div class="report" id="reportBox">
    <h2>Final Report</h2>
    <div class="report-body" id="reportText"></div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;

function tagFor(action){
  if(action === 'critique') return 'critique';
  if(['web_search','calculator','write_report','wikipedia_lookup'].includes(action)) return 'act';
  return 'think';
}
function tagLabel(action){
  const map = {web_search:'ACT · SEARCH', calculator:'ACT · CALC', write_report:'ACT · WRITE', wikipedia_lookup:'ACT · WIKI', critique:'CRITIQUE'};
  return map[action] || 'THINK';
}

function addStep(h, delay = 0){
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'step';
  div.style.animationDelay = delay + 'ms';
  div.innerHTML = `
    <span class="tag ${tagFor(h.action)}">${tagLabel(h.action)}</span>
    <span style="color:var(--text)">${h.thought || ''}</span>
    <div class="step-body"><b>Observed:</b> ${(h.observation || '').slice(0,400)}</div>
  `;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function renderMarkdown(md){
  const escapeHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = md.split('\n');
  let html = '';
  let inList = false;
  const closeList = () => { if(inList){ html += '</ul>'; inList = false; } };

  for(let raw of lines){
    const line = raw.trim();
    if(!line){ closeList(); continue; }
    let text = escapeHtml(line);
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/(https?:\/\/[^\s)]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    if(text.startsWith('# ')){ closeList(); html += `<h1>${text.slice(2)}</h1>`; }
    else if(text.startsWith('## ')){ closeList(); html += `<h2>${text.slice(3)}</h2>`; }
    else if(text.startsWith('- ') || text.startsWith('* ')){
      if(!inList){ html += '<ul>'; inList = true; }
      html += `<li>${text.slice(2)}</li>`;
    } else { closeList(); html += `<p>${text}</p>`; }
  }
  closeList();
  return html;
}

async function runAgent(){
  const goal = document.getElementById('goalInput').value.trim();
  if(!goal) return;
  const btn = document.getElementById('runBtn');
  const status = document.getElementById('statusLine');
  const log = document.getElementById('log');
  const reportBox = document.getElementById('reportBox');

  btn.disabled = true;
  log.innerHTML = '';
  reportBox.style.display = 'none';
  status.innerHTML = '<span class="dot"></span>Agent is thinking...';

  try{
    const url = `${API_BASE}/run-stream?goal=${encodeURIComponent(goal)}`;
    const res = await fetch(url);
    if(!res.ok || !res.body) throw new Error('stream failed to open');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let stepCount = 0;

    while(true){
      const {value, done} = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, {stream:true});

      const messages = buffer.split('\n\n');
      buffer = messages.pop();

      for(const msg of messages){
        const line = msg.split('\n').find(l => l.startsWith('data: '));
        if(!line) continue;
        const payload = JSON.parse(line.slice(6));

        if(payload.type === 'step'){
          stepCount++;
          addStep(payload.step);
          status.innerHTML = `<span class="dot"></span>Step ${stepCount} — ${tagLabel(payload.step.action)}`;
        } else if(payload.type === 'final'){
          status.innerHTML = payload.final_message ? `Done — ${payload.final_message}` : 'Done.';
          if(payload.report){
            document.getElementById('reportText').innerHTML = renderMarkdown(payload.report);
            reportBox.style.display = 'block';
          }
        }
      }
    }
  }catch(err){
    status.textContent = 'Error: could not reach the agent backend. Is uvicorn running?';
    console.error(err);
  }finally{
    btn.disabled = false;
  }
}

document.getElementById('goalInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') runAgent();
});
</script>
</body>
</html>
